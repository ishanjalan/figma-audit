name: Handover Watch

on:
  schedule:
    - cron: '15 * * * *'   # Every hour at :15
  workflow_dispatch:

# Need write access to commit state back to the repo.
permissions:
  contents: write

jobs:
  watch:
    name: Comment on handover files
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          # Fetch with a token that can push (GITHUB_TOKEN has contents:write above).
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Write .env from secrets
        run: |
          {
            echo "FIGMA_TOKEN=${{ secrets.FIGMA_TOKEN }}"
            echo "FIGMA_COMMENT_TOKEN=${{ secrets.FIGMA_COMMENT_TOKEN }}"
            echo "FIGMA_HANDOVER_PROJECT_IDS=${{ secrets.FIGMA_HANDOVER_PROJECT_IDS }}"
            echo "GCHAT_WEBHOOK_URL=${{ secrets.GCHAT_WEBHOOK_URL }}"
          } > .env

      - name: Run handover watcher
        run: npm run handover-watch

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .handover-watch-state.json
          # Only commit if there's actually a change (diff --staged exits 1 if nothing staged).
          git diff --staged --quiet || git commit -m "chore: update handover watch state [skip ci]"
          git push
